server:
  port: 9004
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
  tomcat:
    max-http-form-post-size: 200MB
    connection-timeout: 300000
    # 关键：Tomcat NIO connector 输出缓冲配置
    # 默认 socket.appWriteBufSize = 8192，会让 SSE event 累积到 8KB 才真正写出
    # Spring Boot 2.x 不直接暴露该属性，需要通过编程方式设置
    # 参见 AiService.java 中的 SocketBufferConfigurator
    processor-cache: 200
    threads:
      max: 400

spring:
  application:
    name: miaotongdoc

  # 数据库
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:miaotongdocdb}
    username: ${POSTGRES_USER:miaotong}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai

  # Elasticsearch
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://elasticsearch:9200}

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10000

  # 文件上传
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  # Spring AI 配置
  ai:
    openai:
      api-key: ${LLM_API_KEY:sk-placeholder}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${LLM_DEFAULT_MODEL:Qwen36-35B-A3B}
          temperature: 0.7
          max-tokens: 2000

  # OAuth2 Client (SSO) - 仅在 SSO 启用时配置
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         keycloak:
  #           client-id: ${SSO_CLIENT_ID:}
  #           client-secret: ${SSO_CLIENT_SECRET:}
  #           scope: openid,profile,email
  #           authorization-grant-type: authorization_code
  #           redirect-uri: "{baseUrl}/api/sso/callback/{registrationId}"
  #           client-name: 银行统一认证
  #       provider:
  #         keycloak:
  #           issuer-uri: ${SSO_ISSUER_URI:}

# ===== 应用配置 =====
app:
  jwt-secret: ${APP_JWT_SECRET:miaotongdoc-default-jwt-secret-please-change-in-production}
  jwt-expiration: ${APP_JWT_EXPIRATION:7200000}
  storage-path: ${APP_STORAGE_PATH:/data/documents}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost}

# ===== 存储配置 =====
storage:
  type: ${STORAGE_TYPE:local}
  base-path: ${APP_STORAGE_PATH:/data/documents}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://minio:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:miaotongdoc}

# ===== 文档编辑器配置 =====
editor:
  jwt-secret: ${EDITOR_JWT_SECRET:}
  server-url: ${EDITOR_SERVER_URL:http://editor:80}
  callback-url: ${EDITOR_CALLBACK_URL:http://host.docker.internal:9004/api/callback/editor}
  download-url: ${EDITOR_DOWNLOAD_URL:http://host.docker.internal:9004/api/documents}

# ===== SSO 配置 =====
sso:
  enabled: ${SSO_ENABLED:false}
  provider-name: ${SSO_PROVIDER_NAME:银行统一认证}
  claim-mapping:
    employee-id: employee_id
    department-id: department_id
    real-name: name
  auto-provision:
    enabled: ${SSO_AUTO_PROVISION:true}
    employee-id-range-start: 90000001
    employee-id-range-end: 99999999
    default-role: user
  success-redirect: ${SSO_SUCCESS_REDIRECT:/home.html}
  failure-redirect: ${SSO_FAILURE_REDIRECT:/login.html?error=sso_failed}

# ===== Actuator 监控 =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    redis:
      enabled: false
    db:
      enabled: false
    liveness:
      enabled: true
    readiness:
      enabled: true

# ===== AI 代理配置 =====
ai-proxy:
  target-url: ${LLM_API_URL:}
  api-key: ${LLM_API_KEY:}
  timeout: ${LLM_TIMEOUT:300}

# ===== Spring AI 配置（合并到 spring: 节点） =====
# 注意：spring.ai.openai 配置在 spring: 节点内

# ===== Docling 文档解析配置 =====
docling:
  server-url: ${DOCLING_SERVER_URL:http://docling:5001}
  enabled: ${DOCLING_ENABLED:false}
  timeout: ${DOCLING_TIMEOUT:300}
  ocr-languages: ${DOCLING_OCR_LANGUAGES:chi_sim+eng}

# ===== OCR 配置 =====
ocr:
  server-url: ${OCR_SERVER_URL:http://ocr:5002}
  enabled: ${OCR_ENABLED:false}

# ===== 日志 =====
logging:
  level:
    com.miaotong.doc: DEBUG
    com.miaotong.doc.service.ai: DEBUG
    org.springframework.security: WARN
