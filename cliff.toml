# git-cliff configuration for MiaotongDoc
# Docs: https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md from Conventional Commits.
# Usage:
#   git cliff --tag v1.0.0..HEAD   # preview changes since a tag
#   git cliff --unreleased --tag next --bump    # dry-run a release
#   git cliff > CHANGELOG.md       # regenerate full changelog
#
# Install: npm i -g git-cliff
# (see .githooks/commit-msg for commit linting, .gitmessage for template)

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/).\n
"""
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | trim_start_matches(pat="^\\[?") | trim_end_matches(pat="\\]?$") | upper_first }}
{% for commit in commits | sort(attribute="message") %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | split(pat="\n") | first | trim }}\
  {% if commit.breaking %}(⚠️ **BREAKING**) {% endif %}\
  {% if commit.id %}([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }})){% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
<!-- Generated by git-cliff — do not edit manually. -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"

[[git.commit_parsers]]
message = "^feat"
group = "🚀 Features"

[[git.commit_parsers]]
message = "^fix"
group = "🐛 Bug Fixes"

[[git.commit_parsers]]
message = "^perf"
group = "⚡ Performance"

[[git.commit_parsers]]
message = "^refactor"
group = "♻️ Refactor"

[[git.commit_parsers]]
message = "^docs"
group = "📚 Documentation"

[[git.commit_parsers]]
message = "^test"
group = "🧪 Tests"

[[git.commit_parsers]]
message = "^build"
group = "📦 Build System"

[[git.commit_parsers]]
message = "^ci"
group = "🔧 CI"

[[git.commit_parsers]]
message = "^chore"
group = "🧹 Chore"

[[git.commit_parsers]]
message = "^style"
group = "💄 Style"

[[git.commit_parsers]]
message = "^revert"
group = "⏪ Reverts"

# Skip merge commits and noisy non-conventional commits
[[git.commit_parsers]]
message = "^Merge"
skip = true

[[git.commit_parsers]]
message = "^Revert"
skip = true

[[git.commit_parsers]]
message = "^初始化"
skip = true

[[git.commit_parsers]]
message = "^init$"
skip = true

[[git.commit_parsers]]
message = "^WIP"
skip = true

[bump]
features_always_bump_minor = false
breaking_always_bump_major = true