# AI Proxy 配置 - 将 /ai-proxy 请求转发到后端 Spring Boot
# 需要在 ds-docservice.conf 中的 ai-proxy location 之后加载

# 定义 upstream（如果还没有定义）
upstream backend_ai {
    server web-server:9004;
}

# 拦截 /ds-vpath/{version}/ai-proxy 请求，转发到后端
location ~* ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(ai-proxy)(\/.*)?$ {
    # 转发到后端 API，保留路径 /api/ai/proxy
    proxy_pass http://backend_ai/api/ai/proxy$3;

    proxy_http_version 1.1;
    proxy_connect_timeout 300s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
    send_timeout          900s;

    # 转发必要的请求头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Type application/json;

    # 允许流式响应
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
}
