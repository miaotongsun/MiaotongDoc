version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: miaotongdoc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/service-worker-override.js:/etc/nginx/service-worker-override.js:ro
      - ../miaotongdoc-web/dist:/usr/share/nginx/html
    depends_on:
      - web-server
      - editor
      - editor2
      - editor3
    networks:
      mtd-net:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  postgres:
    image: postgres:12
    container_name: miaotongdoc-postgres
    environment:
      POSTGRES_DB: miaotongdocdb
      POSTGRES_USER: miaotong
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miaotong -d miaotongdocdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      mtd-net:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: miaotongdoc-redis
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      mtd-net:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: miaotongdoc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: miaotong
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq2024}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      mtd-net:
        ipv4_address: 172.20.0.35
    restart: unless-stopped

  web-server:
    image: eclipse-temurin:17-jre
    container_name: miaotongdoc-server
    ports:
      - "9004:9004"
    volumes:
      - ../miaotongdoc-server/target/miaotongdoc.jar:/app/app.jar
      - ../document-storage:/data/documents
    command: java -jar /app/app.jar
    environment:
      SPRING_PROFILES_ACTIVE: prod
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION: ${APP_JWT_EXPIRATION}
      EDITOR_JWT_SECRET: ${EDITOR_JWT_SECRET}
      EDITOR_SERVER_URL: http://editor:80
      EDITOR_CALLBACK_URL: http://web-server:9004/api/callback/editor
      EDITOR_DOWNLOAD_URL: http://web-server:9004/api/documents
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_DB: miaotongdocdb
      POSTGRES_USER: miaotong
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SSO_ENABLED: ${SSO_ENABLED}
      SSO_ISSUER_URI: ${SSO_ISSUER_URI}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET}
      SSO_PROVIDER_NAME: ${SSO_PROVIDER_NAME}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9004/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      editor:
        condition: service_started
    networks:
      mtd-net:
        ipv4_address: 172.20.0.40
    restart: unless-stopped

  editor:
    image: miaotongdoc-editor:latest
    container_name: miaotongdoc-editor
    build:
      context: ../MiaotongDoc-Editor
      dockerfile: Dockerfile
      args:
        - BASE_IMAGE=onlyoffice/documentserver:9.3
    environment:
      - TZ=Asia/Shanghai
      - JWT_ENABLED=true
      - JWT_SECRET=${EDITOR_JWT_SECRET}
      - JWT_IN_BODY=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=miaotongdocdb
      - DB_USER=miaotong
      - DB_PWD=${DB_PASSWORD}
      - DB_TYPE=postgres
      - EDITOR_JWT_SECRET=${EDITOR_JWT_SECRET}
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
      - REDIS_SERVER_PASS=${REDIS_PASSWORD}
      - AMQP_URI=amqp://miaotong:${RABBITMQ_PASSWORD:-rabbitmq2024}@rabbitmq:5672
      - COAUTH_ALLOW_PRIVATE_IP=true
      - SECURE_LINK_SECRET=MiaotongDoc2024Secret
    volumes:
      - editor-data:/var/www/onlyoffice/Data
      - editor-cache:/var/lib/onlyoffice/documentserver/App_Data
      - editor-logs:/var/log/onlyoffice
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      mtd-net:
        ipv4_address: 172.20.0.50
    restart: unless-stopped

  editor2:
    image: miaotongdoc-editor:latest
    container_name: miaotongdoc-editor2
    environment:
      - TZ=Asia/Shanghai
      - JWT_ENABLED=true
      - JWT_SECRET=${EDITOR_JWT_SECRET}
      - JWT_IN_BODY=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=miaotongdocdb
      - DB_USER=miaotong
      - DB_PWD=${DB_PASSWORD}
      - DB_TYPE=postgres
      - EDITOR_JWT_SECRET=${EDITOR_JWT_SECRET}
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
      - REDIS_SERVER_PASS=${REDIS_PASSWORD}
      - AMQP_URI=amqp://miaotong:${RABBITMQ_PASSWORD:-rabbitmq2024}@rabbitmq:5672
      - COAUTH_ALLOW_PRIVATE_IP=true
      - SECURE_LINK_SECRET=MiaotongDoc2024Secret
    volumes:
      - editor-data:/var/www/onlyoffice/Data
      - editor-cache:/var/lib/onlyoffice/documentserver/App_Data
      - editor2-logs:/var/log/onlyoffice
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      mtd-net:
        ipv4_address: 172.20.0.51
    restart: unless-stopped

  editor3:
    image: miaotongdoc-editor:latest
    container_name: miaotongdoc-editor3
    environment:
      - TZ=Asia/Shanghai
      - JWT_ENABLED=true
      - JWT_SECRET=${EDITOR_JWT_SECRET}
      - JWT_IN_BODY=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=miaotongdocdb
      - DB_USER=miaotong
      - DB_PWD=${DB_PASSWORD}
      - DB_TYPE=postgres
      - EDITOR_JWT_SECRET=${EDITOR_JWT_SECRET}
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
      - REDIS_SERVER_PASS=${REDIS_PASSWORD}
      - AMQP_URI=amqp://miaotong:${RABBITMQ_PASSWORD:-rabbitmq2024}@rabbitmq:5672
      - COAUTH_ALLOW_PRIVATE_IP=true
      - SECURE_LINK_SECRET=MiaotongDoc2024Secret
    volumes:
      - editor-data:/var/www/onlyoffice/Data
      - editor-cache:/var/lib/onlyoffice/documentserver/App_Data
      - editor3-logs:/var/log/onlyoffice
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      mtd-net:
        ipv4_address: 172.20.0.52
    restart: unless-stopped

  # OnlyOffice 文件缓存定时清理（每天凌晨3点清理超过24h的缓存）
  cache-cleaner:
    image: alpine:latest
    container_name: miaotongdoc-cache-cleaner
    environment:
      - CACHE_MAX_AGE_HOURS=24
    volumes:
      - editor-cache:/var/cache/onlyoffice
      - ./scripts/clean-editor-cache.sh:/scripts/clean.sh:ro
    entrypoint: /bin/sh
    command: -c "echo '0 3 * * * /bin/sh /scripts/clean.sh >> /proc/1/fd/1 2>&1' | crontab - && crond -f -l 8"
    networks:
      - mtd-net
    restart: unless-stopped

networks:
  mtd-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  pgdata:
  rabbitmq-data:
  editor-data:
  editor-cache:
  editor-logs:
  editor2-logs:
  editor3-logs:
