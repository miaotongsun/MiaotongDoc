events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 200m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # 如果 socket.io 请求没有带 EIO/transport 参数，自动补上默认值
    map $args $socketio_default_args {
        default "";
        "~*transport=polling" "";
        ""  "EIO=4&transport=polling";
    }

    # 从 URL 中提取文档 key（UUID 格式），用于路由亲和
    map $request_uri $doc_key {
        "~/(?:doc|docx)/([\w]{8}-[\w]{4}-[\w]{4}-[\w]{4}-[\w]{12})"  $1;
        "~/cache/files/data/([\w]{8}-[\w]{4}-[\w]{4}-[\w]{4}-[\w]{12})"  $1;
        default "";
    }

    upstream backend {
        server web-server:9004;
    }

    # 按文档 key 哈希：同一文档的请求路由到同一个 editor（负载均衡）
    upstream editors {
        hash $doc_key$remote_addr consistent;
        server editor:80;
        server editor2:80;
        server editor3:80;
    }

    # socket.io 专用：按 remote_addr 哈希（保证握手和后续请求到同一 editor）
    upstream editors_socketio {
        hash $remote_addr consistent;
        server editor:80;
        server editor2:80;
        server editor3:80;
    }

    server {
        listen 80;
        server_name _;

        # 插件静态资源（浏览器相对 URL 解析到 /sdkjs-plugins/ 而非 /ds-vpath/.../sdkjs-plugins/）
        location /sdkjs-plugins/ {
            proxy_pass http://editors/sdkjs-plugins/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 前端静态资源
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # AI 代理流式响应（SSE）
        location /api/ai/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # 后端 API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket — 协作状态
        location /ws/presence/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        # WebSocket — 通知推送
        location /ws/notifications {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        # socket.io 握手请求（vendor/socket.io）- 需要注入 EIO 参数
        location ~ ^/ds-vpath/[^/]+/vendor/socket\.io {
            set $args $args$socketio_default_args;
            rewrite ^/ds-vpath/([^/]+)/(.*)$ /$2 break;
            proxy_pass http://editors_socketio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ds-vpath;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        # socket.io 后续请求（docx/ 或 doc/ 路径下的 socket.io）
        location ~ ^/ds-vpath/[^/]+/(docx|doc)/ {
            set $args $args$socketio_default_args;
            rewrite ^/ds-vpath/([^/]+)/(.*)$ /$2 break;
            proxy_pass http://editors_socketio;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ds-vpath;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;
        }

        # 文档编辑器服务（其他 /ds-vpath/ 请求）
        location /ds-vpath/ {
            proxy_pass http://editors/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ds-vpath;
            proxy_read_timeout 900s;
            proxy_send_timeout 900s;

            # 覆盖上游的 immutable 缓存头，确保浏览器不永久缓存编辑器资源
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;
            proxy_hide_header Expires;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
