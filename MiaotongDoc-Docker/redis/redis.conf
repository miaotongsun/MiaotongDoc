# Redis 配置文件

bind 0.0.0.0
port 6379

# 持久化
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# 内存管理
maxmemory 512mb
maxmemory-policy allkeys-lru

# 安全：禁用危险命令
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG "CONFIG_mt_2026"
rename-command DEBUG ""

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
